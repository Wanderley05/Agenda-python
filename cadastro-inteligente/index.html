<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulário de cadastro de cliente com validação em tempo real">
  <title>Cadastro Inteligente | Formulário de Registro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
  <h1>Cadastro de Cliente</h1>
  
  <form id="cadastroForm" novalidate aria-label="Formulário de cadastro de cliente">

    <!-- NOME -->
    <div class="form-group">
      <label for="nome">Nome Completo <span aria-label="obrigatório">*</span></label>
      <input 
        type="text" 
        id="nome" 
        name="nome" 
        required 
        minlength="3"
        autocomplete="name"
        placeholder="Digite seu nome completo"
        aria-describedby="nome-error"
      >
      <span class="msg" id="nome-error" role="alert"></span>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label for="email">E-mail <span aria-label="obrigatório">*</span></label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        required
        autocomplete="email"
        placeholder="seu.email@exemplo.com"
        aria-describedby="email-error"
      >
      <span class="msg" id="email-error" role="alert"></span>
    </div>

    <!-- SENHA -->
    <div class="form-group">
      <label for="senha">Senha <span aria-label="obrigatório">*</span></label>
      <input 
        type="password" 
        id="senha" 
        name="senha" 
        required 
        minlength="8"
        autocomplete="new-password"
        placeholder="Mínimo 8 caracteres"
        aria-describedby="senha-error strength-text"
      >

      <!-- BARRA DE FORÇA -->
      <div class="strength-bar" role="progressbar" aria-label="Força da senha" aria-valuemin="0" aria-valuemax="4">
        <div id="strength-fill"></div>
      </div>
      <span id="strength-text" aria-live="polite" aria-atomic="true"></span>

      <span class="msg" id="senha-error" role="alert"></span>
    </div>

    <!-- CONFIRMAR SENHA -->
    <div class="form-group">
      <label for="confirmar">Confirmar Senha <span aria-label="obrigatório">*</span></label>
      <input 
        type="password" 
        id="confirmar" 
        name="confirmar"
        required
        autocomplete="new-password"
        placeholder="Digite sua senha novamente"
        aria-describedby="confirmar-error"
      >
      <span class="msg" id="confirmar-error" role="alert"></span>
    </div>

    <button type="submit" aria-label="Enviar formulário de cadastro">Cadastrar</button>

    <!-- MENSAGEM FINAL -->
    <p id="mensagem-final" role="status" aria-live="polite" aria-atomic="true"></p>

  </form>
</div>

<script src="css/js/validation.js"></script>
</body>
</html>
